<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 - Page Not Found | Prepreater & Co.</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1a2f4a 100%);
      color: #e6eef8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    .error-code {
      font-size: 120px;
      font-weight: 700;
      background: linear-gradient(135deg, #6EE7B7 0%, #5eead4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      line-height: 1;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      color: #6EE7B7;
    }

    p {
      font-size: 18px;
      color: #9ca3af;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #6EE7B7 0%, #5eead4 100%);
      color: #0a1628;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(110, 231, 183, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(110, 231, 183, 0.4);
    }

    .octopus {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="octopus" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

        fill="#6EE7B7" opacity="0.3"/>
      <circle cx="32" cy="24" r="14" fill="#6EE7B7"/>
      <path d="M20 40C20 40 18 44 18 48C18 50 19 52 21 52C23 52 24 50 24 48C24 44 22 40 22 40"
        stroke="#6EE7B7" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M28 44C28 44 26 48 26 52C26 54 27 56 29 56C31 56 32 54 32 52C32 48 30 44 30 44"
        stroke="#6EE7B7" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M36 44C36 44 34 48 34 52C34 54 35 56 37 56C39 56 40 54 40 52C40 48 38 44 38 44"
        stroke="#6EE7B7" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M44 40C44 40 42 44 42 48C42 50 43 52 45 52C47 52 48 50 48 48C48 44 46 40 46 40"
        stroke="#6EE7B7" stroke-width="2" stroke-linecap="round" fill="none"/>
      <circle cx="28" cy="22" r="2" fill="#0a1628"/>
      <circle cx="36" cy="22" r="2" fill="#0a1628"/>
    </svg>

    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>Oops! The page you're looking for seems to have swum away. Let's get you back on track.</p>
    <a href="/" class="btn">Go Home</a>
  </div>
</body>
</html>
