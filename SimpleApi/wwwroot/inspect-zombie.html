<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zombie GLB Inspector</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0a1628;
      color: #fff;
      font-family: monospace;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      z-index: 1000;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }
    pre {
      background: #000;
      padding: 10px;
      border-radius: 5px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div id="info">
    <h2>🧟 Zombie GLB Inspector</h2>
    <div id="output">Loading zombie.glb...</div>
  </div>
  <div id="canvas-container"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const output = document.getElementById('output');

    function log(message) {
      output.innerHTML += message + '<br>';
      console.log(message);
    }

    // Setup scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1628);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Add lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Add grid helper
    const gridHelper = new THREE.GridHelper(10, 10);
    scene.add(gridHelper);

    // Add orbit controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Load zombie model
    const loader = new GLTFLoader();
    let mixer = null;
    let model = null;

    loader.load(
      'assets/models/zombie.glb',
      (gltf) => {
        output.innerHTML = '<h3>✅ Model Loaded Successfully!</h3>';

        model = gltf.scene;
        scene.add(model);

        // Get bounding box
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        log('<h4>📦 Model Dimensions:</h4>');
        log(`<pre>Size: ${JSON.stringify({
          x: size.x.toFixed(2),
          y: size.y.toFixed(2),
          z: size.z.toFixed(2)
        }, null, 2)}</pre>`);
        log(`<pre>Center: ${JSON.stringify({
          x: center.x.toFixed(2),
          y: center.y.toFixed(2),
          z: center.z.toFixed(2)
        }, null, 2)}</pre>`);

        // Adjust camera to view model
        const maxDim = Math.max(size.x, size.y, size.z);
        camera.position.set(0, maxDim, maxDim * 2);
        camera.lookAt(center);
        controls.target.copy(center);

        // Log scene graph
        log('<h4>🌳 Scene Graph:</h4>');
        let nodeCount = 0;
        model.traverse((node) => {
          nodeCount++;
          const indent = '  '.repeat(getDepth(node, model));
          const type = node.type;
          const name = node.name || '(unnamed)';
          log(`${indent}${type}: ${name}`);

          if (node.isMesh) {
            log(`${indent}  └─ Geometry: ${node.geometry.type}, Vertices: ${node.geometry.attributes.position.count}`);
          }
          if (node.isSkinnedMesh) {
            log(`${indent}  └─ 🦴 SkinnedMesh detected!`);
          }
          if (node.isBone) {
            log(`${indent}  └─ 🦴 Bone`);
          }
        });
        log(`<strong>Total nodes: ${nodeCount}</strong>`);

        // Log animations
        log('<h4>🎬 Animations:</h4>');
        if (gltf.animations && gltf.animations.length > 0) {
          log(`<strong>Found ${gltf.animations.length} animation(s):</strong>`);
          gltf.animations.forEach((clip, index) => {
            log(`<pre>${index}: "${clip.name}"
  Duration: ${clip.duration.toFixed(2)}s
  Tracks: ${clip.tracks.length}
  Track Names:
${clip.tracks.map(t => `    - ${t.name}`).join('\n')}</pre>`);
          });

          // Create mixer and play first animation
          mixer = new THREE.AnimationMixer(model);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
          log(`<strong>▶️ Playing animation: "${gltf.animations[0].name}"</strong>`);
        } else {
          log('<strong>⚠️ No animations found in model!</strong>');
        }

        // Log materials
        log('<h4>🎨 Materials:</h4>');
        const materials = new Set();
        model.traverse((node) => {
          if (node.material) {
            if (Array.isArray(node.material)) {
              node.material.forEach(mat => materials.add(mat));
            } else {
              materials.add(node.material);
            }
          }
        });
        materials.forEach((mat, index) => {
          log(`Material ${index + 1}: ${mat.name || '(unnamed)'} - Type: ${mat.type}`);
        });

      },
      (progress) => {
        const percent = (progress.loaded / progress.total * 100).toFixed(2);
        output.innerHTML = `Loading: ${percent}%`;
      },
      (error) => {
        output.innerHTML = `<strong>❌ Error loading model:</strong><br>${error}`;
        console.error(error);
      }
    );

    // Helper function to get node depth
    function getDepth(node, root) {
      let depth = 0;
      let current = node;
      while (current && current !== root) {
        depth++;
        current = current.parent;
      }
      return depth;
    }

    // Animation loop
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      if (mixer) {
        mixer.update(delta);
      }

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
