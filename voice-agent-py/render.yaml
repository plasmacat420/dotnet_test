services:
  - type: worker
    name: livekit-voice-agent
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: TTS_PROVIDER
        value: elevenlabs
      - key: TTS_VOICE
        value: Rachel
      - key: TTS_MODEL
        value: eleven_multilingual_v2
      - key: AGENT_NAME
        value: Hindi-English-Voice-Agent
      - key: PLAYGROUND_MODE
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: AGENT_PORT
        value: "8081"
